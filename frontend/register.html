<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saukele - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><a href="index.html" style="text-decoration:none; color:inherit;">Saukele</a></h1>
        <nav id="navMenu">
            <a href="login.html">Login</a>
        </nav>
    </header>

    <div class="container">
        <h2>Register</h2>
        <div id="notification" class="notification"></div>
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password (min 8 chars, 1 number)</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Register</button>
            <button type="button" class="btn btn-secondary" onclick="handleResendVerification()">Resend Verification Email</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
