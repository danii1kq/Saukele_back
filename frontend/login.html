<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saukele - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
    <header class="border-bottom bg-white shadow-sm">
        <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">
            <a class="text-decoration-none fw-bold fs-4 text-dark" href="index.html">Saukele</a>
            <nav class="d-flex flex-wrap align-items-center gap-2">
                <a class="btn btn-outline-secondary btn-sm" href="index.html">Home</a>
                <a class="btn btn-outline-primary btn-sm" href="register.html">Register</a>
                <button id="btnLogout" class="btn btn-outline-danger btn-sm d-none" type="button" onclick="logout()">Logout</button>
            </nav>
        </div>
    </header>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <a class="text-decoration-none fw-bold fs-4 text-dark" href="index.html">Saukele</a>
                            <a class="link-secondary text-decoration-none" href="register.html">Register</a>
                        </div>
                        <h1 class="h3 mb-3">Login</h1>
                        <div id="notification" class="alert d-none" role="alert"></div>
                        <form id="loginForm" onsubmit="handleLogin(event)" class="vstack gap-3">
                            <div>
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <div>
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Login</button>
                            <button type="button" class="btn btn-outline-secondary" onclick="handleForgotPassword()">Forgot Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
