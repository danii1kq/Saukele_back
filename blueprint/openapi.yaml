  /admin/audit-logs:
    get:
      tags: [Admin]
      summary: View append-only audit log (ADMIN only, cursor-based)
      security:
        - BearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema:
            type: integer
        - name: take
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: resourceType
          in: query
          schema:
            type: string
          example: GiftItem
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, -createdAt]
            default: "-createdAt"
      responses:
        '200':
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        userId:
                          type: integer
                          nullable: true
                        action:
                          type: string
                          example: CONTRIBUTION_CREATED
                        resourceType:
                          type: string
                          example: GiftItem
                        resourceId:
                          type: integer
                        oldValues:
                          type: object
                          nullable: true
                        newValues:
                          type: object
                          nullable: true
                        ipAddress:
                          type: string
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
                  meta:
                    $ref: '#/components/schemas/CursorMeta'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: ADMIN role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/exchange-rates:
    patch:
      tags: [Admin]
      summary: Override and create new exchange rate snapshot (ADMIN only)
      description: Creates a new immutable snapshot row. Historical snapshots are never updated.
      security:
        - BearerAuth: []
      requestBody:
        required: true
